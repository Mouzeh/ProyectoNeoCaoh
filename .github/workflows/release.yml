name: 🎮 Export & Release Pokemon TCG

on:
  push:
    tags:
      - 'v*'   # Se activa cuando haces: git tag v0.2.0 && git push --tags

env:
  GODOT_VERSION: 4.3
  PROJECT_PATH: .
  EXPORT_PATH: ./builds

jobs:
  export-and-release:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: 📁 Crear directorios de export
        run: |
          mkdir -p $EXPORT_PATH/windows
          mkdir -p $EXPORT_PATH/macos
          mkdir -p $EXPORT_PATH/linux
          mkdir -p ~/.config/godot/export_credentials

      - name: 🖥️ Export Windows
        run: |
          godot --headless --export-release "Windows Desktop" \
            $EXPORT_PATH/windows/PokemonTCG.exe

      - name: 🍎 Export macOS
        run: |
          godot --headless --export-release "macOS" \
            $EXPORT_PATH/macos/PokemonTCG.app

      - name: 🐧 Export Linux
        run: |
          godot --headless --export-release "Linux/X11" \
            $EXPORT_PATH/linux/PokemonTCG

      - name: 📦 Comprimir builds
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cd $EXPORT_PATH/windows && zip -r ../PokemonTCG-windows-${TAG}.zip .
          cd $EXPORT_PATH/macos   && zip -r ../PokemonTCG-macos-${TAG}.zip .
          cd $EXPORT_PATH/linux   && zip -r ../PokemonTCG-linux-${TAG}.zip .

      - name: 📝 Actualizar version.json
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}   # Quita la "v" → "0.2.0"
          DATE=$(date +%Y-%m-%d)

          # Actualiza version.json con las URLs del nuevo release
          cat > version.json << EOF
          {
            "version": "${VERSION}",
            "release_date": "${DATE}",
            "changelog": ["Release ${TAG}"],
            "downloads": {
              "windows": "https://github.com/${{ github.repository }}/releases/download/${TAG}/PokemonTCG-windows-${TAG}.zip",
              "macos":   "https://github.com/${{ github.repository }}/releases/download/${TAG}/PokemonTCG-macos-${TAG}.zip",
              "linux":   "https://github.com/${{ github.repository }}/releases/download/${TAG}/PokemonTCG-linux-${TAG}.zip"
            }
          }
          EOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: bump version.json to ${VERSION} [skip ci]"
          git push origin HEAD:main

      - name: 🚀 Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Pokemon TCG ${{ github.ref_name }}"
          body: "Release automático generado por GitHub Actions"
          files: |
            ${{ env.EXPORT_PATH }}/PokemonTCG-windows-*.zip
            ${{ env.EXPORT_PATH }}/PokemonTCG-macos-*.zip
            ${{ env.EXPORT_PATH }}/PokemonTCG-linux-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
